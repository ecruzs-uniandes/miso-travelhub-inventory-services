name: CI

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]

env:
  REGION: us-central1
  SERVICE_NAME: inventory-services

  # DEV (gen-lang-client-0930444414)
  DEV_PROJECT_ID: gen-lang-client-0930444414
  DEV_IMAGE: us-central1-docker.pkg.dev/gen-lang-client-0930444414/inventory-services/inventory-services
  DEV_WIF_PROVIDER: projects/154299161799/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  DEV_SA: github-deploy-inventory@gen-lang-client-0930444414.iam.gserviceaccount.com

  # PROD (travelhub-prod-492116)
  PROD_PROJECT_ID: travelhub-prod-492116
  PROD_PROJECT_NUMBER: "974898737307"
  PROD_IMAGE: us-central1-docker.pkg.dev/travelhub-prod-492116/inventory-services/inventory-services
  PROD_WIF_PROVIDER: projects/974898737307/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  PROD_SA: github-deploy-inventory@travelhub-prod-492116.iam.gserviceaccount.com

jobs:
  tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    env:
      # CI_DB_PASSWORD must be set as a GitHub Actions secret.
      # For forks without the secret the workflow still runs via the fallback.
      CI_DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci-ephemeral-only' }}

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: travelhub_app
          POSTGRES_PASSWORD: ${{ secrets.CI_DB_PASSWORD || 'ci-ephemeral-only' }}
          POSTGRES_DB: travelhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Enable btree_gist
        run: |
          PGPASSWORD="${CI_DB_PASSWORD}" psql -h localhost -U travelhub_app -d travelhub_test \
            -c "CREATE EXTENSION IF NOT EXISTS btree_gist;"

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql+asyncpg://travelhub_app:${{ env.CI_DB_PASSWORD }}@localhost:5432/travelhub_test
          JWT_ISSUER: https://auth.travelhub.app
          JWT_AUDIENCE: travelhub-api
        run: pytest

  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint tools
        run: pip install "ruff>=0.4"
      - name: ruff
        run: ruff check app/ tests/ || true

  # ── DEV: deploy directo a Cloud Run ──
  deploy-dev:
    name: Deploy to Dev (Cloud Run)
    runs-on: ubuntu-latest
    needs: [tests, lint]
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/'))
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.DEV_WIF_PROVIDER }}
          service_account: ${{ env.DEV_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build + push
        run: |
          docker build -f deploy/Dockerfile -t ${{ env.DEV_IMAGE }}:${{ github.sha }} -t ${{ env.DEV_IMAGE }}:latest .
          docker push --all-tags ${{ env.DEV_IMAGE }}
      - name: Deploy Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --project=${{ env.DEV_PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --image=${{ env.DEV_IMAGE }}:${{ github.sha }} \
            --port=8000 --allow-unauthenticated \
            --clear-vpc-connector \
            --network=travelhub-vpc --subnet=subnet-services \
            --vpc-egress=private-ranges-only \
            --min-instances=0 --max-instances=5 \
            --set-env-vars="SERVICE_NAME=inventory-services,JWT_ISSUER=https://auth.travelhub.app,JWT_AUDIENCE=travelhub-api,KAFKA_ENABLED=true,KAFKA_TOPIC_INVENTORY_RATES=inventory-rate-events" \
            --set-secrets="DATABASE_URL=INVENTORY_DATABASE_URL:latest,KAFKA_BOOTSTRAP_SERVERS=KAFKA_BOOTSTRAP_SERVERS:latest" \
            --quiet

  # ── PROD: Cloud Deploy canary (10% → 50% → 100%) ──
  deploy-prod:
    name: Deploy to Prod (Cloud Deploy Canary)
    runs-on: ubuntu-latest
    needs: [tests, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.PROD_WIF_PROVIDER }}
          service_account: ${{ env.PROD_SA }}
      - uses: google-github-actions/setup-gcloud@v2
      - name: Docker auth
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet
      - name: Build + push
        run: |
          docker build -f deploy/Dockerfile -t ${{ env.PROD_IMAGE }}:${{ github.sha }} -t ${{ env.PROD_IMAGE }}:latest .
          docker push --all-tags ${{ env.PROD_IMAGE }}
      - name: Create Cloud Deploy release
        run: |
          gcloud deploy releases create prod-${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S) \
            --project=${{ env.PROD_PROJECT_ID }} --region=${{ env.REGION }} \
            --delivery-pipeline=${{ env.SERVICE_NAME }} \
            --images=${{ env.SERVICE_NAME }}=${{ env.PROD_IMAGE }}:${{ github.sha }} \
            --skaffold-file=skaffold.yaml

  docker-build:
    name: Docker Build (PR check)
    runs-on: ubuntu-latest
    needs: [tests, lint]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker build -f deploy/Dockerfile -t ${{ env.SERVICE_NAME }}:${{ github.sha }} .
