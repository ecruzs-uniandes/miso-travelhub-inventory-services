# NOTA: este manifiesto NO controla el IAM binding (allUsers -> run.invoker).
# El binding se aplica como step previo en .github/workflows/ci.yml deploy-prod,
# o manualmente:
#   gcloud run services add-iam-policy-binding inventory-services \
#     --region=us-central1 --project=travelhub-prod-492116 \
#     --member=allUsers --role=roles/run.invoker
# Sin este binding el verify-health de Cloud Deploy falla con 403 (skaffold
# pega /health sin token). La validacion JWT vive en gateway + backend; el
# servicio publico a nivel Cloud Run es la convencion TravelHub (igual a
# user-services, pms-int, pms-sync, notification).
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: inventory-services
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/network-interfaces: '[{"network":"prod-travelhub-vpc","subnetwork":"prod-travelhub-subnet-services"}]'
        run.googleapis.com/vpc-access-egress: private-ranges-only
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: inventory-services
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: SERVICE_NAME
              value: inventory-services
            - name: SERVICE_PORT
              value: "8000"
            - name: JWT_ISSUER
              value: https://auth.travelhub.app
            - name: JWT_AUDIENCE
              value: travelhub-api
            - name: KAFKA_ENABLED
              value: "true"
            - name: KAFKA_TOPIC_INVENTORY_RATES
              value: inventory-rate-events
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: INVENTORY_DATABASE_URL
                  key: latest
            - name: KAFKA_BOOTSTRAP_SERVERS
              valueFrom:
                secretKeyRef:
                  name: KAFKA_BOOTSTRAP_SERVERS
                  key: latest
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
