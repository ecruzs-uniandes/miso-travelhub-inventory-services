[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
testpaths = ["tests"]
addopts = "-v --cov=app --cov-report=term-missing --cov-fail-under=70"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
# N815: mixedCase variables — los modelos canónicos TravelHub usan camelCase
#       (habitacionId, precioBase, fechaInicio, etc.) por contrato del schema BD.
ignore = ["B008", "N815"]

[tool.coverage.run]
omit = ["app/main.py", "alembic/*", "tests/*"]
